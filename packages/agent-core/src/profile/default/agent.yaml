name: agent
description: Default Kimi Code agent

systemPromptPath: ./system.md
promptVars:
  roleAdditional: ''

tools:
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash
  - TaskList
  - TaskOutput
  - TaskStop
  - CronCreate
  - CronList
  - CronDelete
  - ReadMediaFile
  - TodoList
  - Skill
  - WebSearch
  - Agent
  - AgentSwarm
  - FetchURL
  - AskUserQuestion
  - EnterPlanMode
  - ExitPlanMode
  - CreateGoal
  - GetGoal
  - SetGoalBudget
  - UpdateGoal
  - mcp__*

subagents:
  coder:
    description: General software engineering agent — the only subagent type with file-editing tools; use it for any delegated task that must modify code.
  explore:
    description: Fast codebase exploration with prompt-enforced read-only behavior.
  plan:
    description: Read-only implementation planning and architecture design.
  orchestrator:
    description: Multi-agent verification orchestrator — coordinates collectors, debaters, and aggregators, then returns a structured verdict.
  collector:
    description: Read-only collection agent for multi-agent file-consensus rounds; returns a justified file list.
  debater:
    description: Adversarial debate participant restricted to read-only code access and moamcp mailbox tools.
  aggregator:
    description: Verdict synthesizer with read-only code and shell access for verifying contested claims.
